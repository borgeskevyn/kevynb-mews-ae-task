version: 2

models:
  - name: int_ledger_posted_eur
    description: >
      One row per posted ledger line (unposted/error journals excluded),
      converted to EUR and joined to account classification. FX and account
      joins are intentionally left joins so a missing rate or account match
      surfaces as a failing not_null test here rather than silently dropping
      the line.
    columns:
      - name: ledger_id
        description: Ledger line ID, primary key at this grain.
        tests:
          - unique
          - not_null

      - name: journal_id
        description: Journal entry this ledger line belongs to (guaranteed posted).

      - name: gl_account_id
        description: GL account code for this ledger line.

      - name: customer_account_id
        description: Customer account number tied to this ledger line.

      - name: entity_id
        description: Legal/reporting entity the ledger line is booked under.

      - name: territory_id
        description: Territory the ledger line is attributed to.

      - name: business_unit_id
        description: Business unit the ledger line is attributed to.

      - name: consolidation_group_id
        description: Consolidation group the ledger line rolls up into.

      - name: ix_code_id
        description: Intercompany/IX code attributed to the ledger line.

      - name: salesforce_customer_id
        description: >
          Salesforce (CRM) customer record matched on customer_account_id.
          ~89% of posted ledger lines resolve to a Salesforce record; null
          here means the line's customer is Business Central-only, not a
          data-quality failure.
        tests:
          - relationships:
              arguments:
                to: ref('stg_salesforce_customers')
                field: salesforce_customer_id

      - name: transaction_currency
        description: Currency the original ledger line amount is denominated in.

      - name: account_type
        description: GL account classification (Revenue, Expense, Asset, Liability) from stg_accounts.
        tests:
          - not_null

      - name: reporting_group
        description: Financial statement grouping the account rolls up to.

      - name: ledger_date
        description: Date the ledger line activity occurred.
        tests:
          - not_null

      - name: amount_original_currency
        description: Line amount in transaction_currency, before FX conversion.
        tests:
          - not_null

      - name: rate_to_eur
        description: FX rate applied for this line's transaction_currency and month.
        tests:
          - not_null

      - name: amount_eur
        description: >
          amount_original_currency converted to EUR using the month's FX rate.
          A null here means no FX rate matched this line's currency/month —
          treated as a data-quality failure, not silently coerced to zero.
        tests:
          - not_null

      - name: is_pl_account
        description: True if the GL account is a P&L (Revenue/Expense) account rather than Balance Sheet.
        tests:
          - not_null

      - name: is_adjustment_entry
        description: True if this ledger line is an adjustment entry rather than original transaction activity.

      - name: is_manual
        description: True if this ledger line was entered manually rather than generated by a system process.
