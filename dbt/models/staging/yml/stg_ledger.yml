version: 2

models:
  - name: stg_ledger
    description: >
      One row per GL ledger line, the core fact table for financial reporting.
      Amounts are in the original transaction currency (`amount_original_currency`);
      no FX conversion or P&L classification happens at this layer.
    columns:
      - name: ledger_id
        description: Ledger line ID, primary key.
        tests:
          - unique
          - not_null

      - name: journal_id
        description: Journal entry this ledger line belongs to.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_journal_entries')
                field: journal_id

      - name: gl_account_id
        description: GL account code — distinct from customer_account_id, see model comment.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_accounts')
                field: account_id

      - name: customer_account_id
        description: >
          Customer account number tied to this ledger line — distinct from
          gl_account_id, see model comment. Not guaranteed to resolve to a
          Salesforce or Business Central customer record.

      - name: entity_id
        description: Legal/reporting entity the ledger line is booked under.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_entity_codes')
                field: entity_id

      - name: territory_id
        description: Territory the ledger line is attributed to.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_territories')
                field: territory_id

      - name: business_unit_id
        description: Business unit the ledger line is attributed to.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_business_units')
                field: business_unit_id

      - name: consolidation_group_id
        description: Consolidation group the ledger line rolls up into.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_consolidation_groups')
                field: consolidation_group_id

      - name: ix_code_id
        description: Intercompany/IX code attributed to the ledger line.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_ix_codes')
                field: ix_code_id

      - name: transaction_currency
        description: Currency the ledger line amount is denominated in.
        tests:
          - not_null

      - name: ledger_date
        description: Date the ledger line activity occurred.
        tests:
          - not_null

      - name: amount_original_currency
        description: Line amount in transaction_currency. No debit/credit sign or indicator is present in the source.
        tests:
          - not_null

      - name: is_adjustment_entry
        description: True if this ledger line is an adjustment entry rather than original transaction activity.

      - name: is_manual
        description: True if this ledger line was entered manually rather than generated by a system process.
