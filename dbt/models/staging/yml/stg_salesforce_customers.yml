version: 2

models:
  - name: stg_salesforce_customers
    description: One row per Salesforce (CRM) customer record.
    columns:
      - name: salesforce_customer_id
        description: Salesforce customer record ID, primary key.
        tests:
          - unique
          - not_null

      - name: customer_account_id
        description: >
          Cross-system account number. Only ~10% of ledger lines' customer
          account numbers resolve to a Salesforce record — most customer
          activity in the ledger is not currently traceable to a CRM record.
        tests:
          - unique
          - not_null

      - name: customer_name
        description: Customer name as recorded in Salesforce.

      - name: billing_country
        description: Customer's billing country code as recorded in Salesforce.

      - name: capacity_s
        description: Small-capacity metric for the customer (source-defined unit).

      - name: capacity_m
        description: Medium-capacity metric for the customer (source-defined unit).

      - name: capacity_l
        description: Large-capacity metric for the customer (source-defined unit).

      - name: is_deleted
        description: True if the customer record has been deleted/archived in Salesforce.
